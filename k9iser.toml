#
# k9iser manifest for tree-sitter-a2ml
# Tree-sitter A2ML grammar — syntax highlighting and parsing grammar for A2ML

[project]
name = "tree-sitter-a2ml"
safety_tier = "hunt"

[[source]]
path = "deno.json"
type = "deno"
output = "generated/k9iser/deno-workspace.k9"

[[source]]
path = "Justfile"
type = "justfile"
output = "generated/k9iser/justfile-recipes.k9"

[[constraint]]
rule = "build.dependencies has no banned_packages"
severity = "error"

[[constraint]]
rule = "deno.imports has no npm: specifiers"
severity = "error"
